apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: my-external-secret
  namespace: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-manager-store
    kind: SecretStore
  target:
    name: aws-secret
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef:
        key: myawssecret
        property: key
